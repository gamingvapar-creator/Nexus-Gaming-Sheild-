workflows:
  android-workflow:
    name: Android Build
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      java: 21
    scripts:
      - name: Setup Gradle Wrapper
        script: |
          gradle wrapper --gradle-version 9.3.1
          chmod +x ./gradlew
      - name: Build Android APK
        script: ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/**/*.apk
